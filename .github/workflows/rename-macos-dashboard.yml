name: Rename macOS dashboard script

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/rename-macos-dashboard.yml

permissions:
  contents: write

jobs:
  rename:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rename script and add compatibility launcher
        shell: bash
        run: |
          set -euo pipefail

          old='macOS/codex-usage-dashboard-v2.2.sh'
          new='macOS/codex-usage-dashboard.sh'

          test -f "$old"
          test ! -e "$new"

          git mv "$old" "$new"

          cat > "$old" <<'EOF'
          #!/bin/bash
          set -euo pipefail

          script_dir="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          printf 'Notice: codex-usage-dashboard-v2.2.sh has been renamed to codex-usage-dashboard.sh.\n' >&2
          exec "$script_dir/codex-usage-dashboard.sh" "$@"
          EOF

          chmod +x "$old" "$new"

          while IFS= read -r -d '' file; do
            sed -i '' 's/codex-usage-dashboard-v2\.2\.sh/codex-usage-dashboard.sh/g' "$file"
          done < <(grep -RIlZ --exclude='codex-usage-dashboard-v2.2.sh' 'codex-usage-dashboard-v2.2.sh' README.md macOS docs 2>/dev/null || true)

          bash -n "$new"
          bash -n "$old"
          grep -q 'VERSION="2.3.0"' "$new"
          grep -q 'exec "$script_dir/codex-usage-dashboard.sh" "$@"' "$old"

      - name: Commit rename
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/rename-macos-dashboard.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Use version-neutral macOS dashboard filename"
          git push
